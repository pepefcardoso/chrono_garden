name: chrono_garden
description: "A time-manipulation puzzle game where you plant seeds and rewind time to solve challenges."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  flutter_hooks: ^0.21.0
  flutter_secure_storage: ^9.2.2
  flutter_shaders: ^0.1.3
  freezed_annotation: ^2.4.4
  go_router: ^14.6.2
  hooks_riverpod: ^2.6.1
  json_annotation: ^4.9.0
  vibration: ^2.0.0

dev_dependencies:
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    
  shaders:
    - assets/shaders/vhs_rewind.frag

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/manrope-regular.otf
          weight: 400
        - asset: assets/fonts/manrope-semibold.otf
          weight: 600
        - asset: assets/fonts/manrope-bold.otf
          weight: 700
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
